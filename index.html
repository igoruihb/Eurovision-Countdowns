<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESC 2026 | Vienna Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --v-pink: #f12e67;
            --v-purple: #5c2084;
            --v-cyan: #00c3d7;
            --v-yellow: #ffb800;
            --row-grad: linear-gradient(90deg, #0a1142, #4d0a4f);
            --transition-smooth: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%; /* Changed to fixed height to prevent ghost scrolling */
        }

        body {
            font-family: 'Outfit', sans-serif; color: white;
            background: linear-gradient(-45deg, var(--v-cyan), var(--v-purple), var(--v-pink), var(--v-yellow));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            perspective: 1500px;
        }

        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        #viewport-wrapper {
            width: 100%; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transform-style: preserve-3d;
            padding-bottom: 20px; /* Minimal padding to prevent touching the edge */
        }

        .intro-active #viewport-wrapper {
            animation: cinematicCamera 10s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        @keyframes cinematicCamera {
            0% { transform: translateZ(700px) rotateX(15deg) translateY(400px); filter: brightness(0); }
            15% { filter: brightness(1); }
            50% { transform: translateZ(300px) rotateX(-10deg) translateY(-100px); }
            100% { transform: translateZ(0) rotateX(0) translateY(0); filter: brightness(1); }
        }

        .logo-wrap { width: 90%; max-width: 450px; margin: 40px auto 10px; animation: logoFloat 4s ease-in-out infinite; }
        .logo-wrap img { width: 100%; height: auto; filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        nav { 
            margin: 20px 0; display: flex; gap: 8px; 
            background: rgba(0,0,0,0.8); padding: 8px; border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .tab { padding: 10px 25px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 900; color: rgba(255,255,255,0.4); transition: var(--transition-smooth); }
        .tab.active { background: white; color: var(--v-purple); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .container { width: 98%; max-width: 1100px; text-align: center; z-index: 10; margin-bottom: 20px; }
        #countries-grid { display: flex; flex-direction: column; gap: 12px; }
        
        .row { 
            display: flex; align-items: center; background: var(--row-grad); 
            border-radius: 60px; padding: 18px 40px; border: 1px solid rgba(255,255,255,0.1); 
            opacity: 0; transform: translateX(-30px);
            animation: slideIn 0.5s ease-out forwards;
            width: 100%;
        }

        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .pill-country { 
            background: white; color: #000; padding: 10px 30px; 
            border-radius: 30px; font-weight: 900; margin-right: 25px; 
            min-width: 220px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #timer-display { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; min-height: 120px; align-items: center; }
        .card { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 20px; min-width: 90px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .num-timer { font-size: 2.5rem; font-weight: 900; display: block; color: #ffffff; }
        .lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        .stage-light { position: fixed; top: -50%; width: 40vw; height: 200%; background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); pointer-events: none; opacity: 0; transition: opacity 2s; z-index: 1; }
        .show-lights .stage-light { opacity: 1; animation: swing 10s infinite alternate ease-in-out; }
        @keyframes swing { from { transform: rotate(15deg); } to { transform: rotate(35deg); } }
    </style>
</head>
<body class="intro-active">

    <audio id="bg-audio" loop autoplay>
        <source src="https://www.image2url.com/r2/default/audio/1778674427620-e9d3cf4d-a74e-4bd6-989c-80757131572e.mp3" type="audio/mpeg">
    </audio>

    <div class="stage-light" style="left: -10%;"></div>
    <div class="stage-light" style="right: -10%;"></div>

    <div id="viewport-wrapper">
        <nav>
            <div class="tab active" onclick="changeView('sf1', this)">Semi 1</div>
            <div class="tab" onclick="changeView('sf2', this)">Semi 2</div>
            <div class="tab" onclick="changeView('gf', this)">Final</div>
        </nav>

        <div class="container">
            <div class="logo-wrap">
                <img src="https://storage.googleapis.com/eurovision-com.appspot.com/renditions/public/cms/frame-2147206933png/Frame%202147206933-width%3D600.png" alt="Eurovision">
            </div>
            <div id="timer-display"></div>
            <h3 style="letter-spacing:4px; text-transform:uppercase; margin-bottom:20px; font-weight:300;">Running Order</h3>
            <div id="countries-grid"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.body.classList.remove('intro-active'), 10000));
        const audio = document.getElementById("bg-audio");
        const playMusic = () => audio.play().catch(() => {});
        ['click', 'touchstart'].forEach(e => document.addEventListener(e, playMusic, {once:true}));

        const participants = {
            sf1: [
                {n:"Moldova", a:"Satoshi — \"Viva, Moldova!\"", num:"01"}, 
                {n:"Sweden", a:"Felicia — \"My System\"", num:"02"}, 
                {n:"Croatia", a:"Lelek — \"Andromeda\"", num:"03"}, 
                {n:"Greece", a:"Akylas — \"Ferto\"", num:"04"}, 
                {n:"Portugal", a:"Bandidos do Cante — \"Rosa\"", num:"05"}, 
                {n:"Georgia", a:"Bzikebi — \"On Replay\"", num:"06"}, 
                {n:"Finland", a:"Linda Lampenius & Pete Parkkonen — \"Liekinheitin\"", num:"07"}, 
                {n:"Montenegro", a:"Tamara Živković — \"Nova zora\"", num:"08"}, 
                {n:"Estonia", a:"Vanilla Ninja — \"Too Epic to Be True\"", num:"09"}, 
                {n:"Israel", a:"Noam Bettan — \"Michelle\"", num:"10"}, 
                {n:"Belgium", a:"Essyla — \"Dancing on the Ice\"", num:"11"}, 
                {n:"Lithuania", a:"Lion Ceccah — \"Sólo quiero más\"", num:"12"}, 
                {n:"San Marino", a:"Senhit ft. Boy George — \"Superstar\"", num:"13"}, 
                {n:"Poland", a:"ALICJA — \"Pray\"", num:"14"}, 
                {n:"Serbia", a:"Lavina — \"Kraj mene\"", num:"15"}
            ],
            sf2: [
                {n:"Bulgaria", a:"Dara — \"Bangaranga\"", num:"01"}, 
                {n:"Azerbaijan", a:"Jiva — \"Just Go\"", num:"02"}, 
                {n:"Romania", a:"Alexandra Căpitănescu — \"Choke Me\"", num:"03"}, 
                {n:"Luxembourg", a:"Eva Marija — \"Mother Nature\"", num:"04"}, 
                {n:"Czechia", a:"Daniel Žižka — \"Crossroads\"", num:"05"}, 
                {n:"Armenia", a:"Simón — \"Paloma Rumba\"", num:"06"}, 
                {n:"Switzerland", a:"Veronica Fusaro — \"Alice\"", num:"07"}, 
                {n:"Cyprus", a:"Antigoni — \"Jalla\"", num:"08"}, 
                {n:"Latvia", a:"Atvara — \"Ēnā\"", num:"09"}, 
                {n:"Denmark", a:"Søren Torpegaard Lund — \"Før vi går hjem\"", num:"10"}, 
                {n:"Australia", a:"Delta Goodrem — \"Eclipse\"", num:"11"}, 
                {n:"Ukraine", a:"Leléka — \"Ridnym\"", num:"12"}, 
                {n:"Albania", a:"Alis — \"Nân\"", num:"13"}, 
                {n:"Malta", a:"Aidan — \"Bella\"", num:"14"}, 
                {n:"Norway", a:"Jonas Lovv — \"Ya Ya Ya\"", num:"15"}
            ],
            gf: [
                {n:"Austria", a:"Cosmó — \"Tanzschein\"", num:"25"}, 
                {n:"France", a:"Monroe — \"Regarde !\"", num:"?"}, 
                {n:"Germany", a:"Sarah Engels — \"Fire\"", num:"?"}, 
                {n:"Italy", a:"Sal Da Vinci — \"Per sempre sì\"", num:"?"}, 
                {n:"United Kingdom", a:"Look Mum No Computer — \"Eins, Zwei, Drei\"", num:"?"},
                {n:"Moldova", a:"Satoshi — \"Viva, Moldova!\"", num:"?"}, 
                {n:"Sweden", a:"Felicia — \"My System\"", num:"?"}, 
                {n:"Croatia", a:"Lelek — \"Andromeda\"", num:"?"}, 
                {n:"Greece", a:"Akylas — \"Ferto\"", num:"?"}, 
                {n:"Finland", a:"Linda & Pete — \"Liekinheitin\"", num:"?"}, 
                {n:"Israel", a:"Noam Bettan — \"Michelle\"", num:"?"}, 
                {n:"Belgium", a:"Essyla — \"Dancing on the Ice\"", num:"?"}, 
                {n:"Lithuania", a:"Lion Ceccah — \"Sólo quiero más\"", num:"?"},
                {n:"Poland", a:"ALICJA — \"Pray\"", num:"?"}, 
                {n:"Serbia", a:"Lavina — \"Kraj mene\"", num:"?"}
            ]
        };

        const eventDates = {
            sf1: new Date("May 12, 2026 21:00:00").getTime(),
            sf2: new Date("May 14, 2026 21:00:00").getTime(),
            gf: new Date("May 16, 2026 21:00:00").getTime()
        };

        let currentView = 'sf1';

        function changeView(view, el) {
            if (currentView === view) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            const grid = document.getElementById('countries-grid');
            grid.style.opacity = '0';
            setTimeout(() => {
                currentView = view;
                renderList();
                updateTimer();
                grid.style.opacity = '1';
            }, 400);
        }

        function renderList() {
            const grid = document.getElementById('countries-grid');
            grid.innerHTML = "";
            participants[currentView].forEach((p, index) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.style.animationDelay = `${index * 0.08}s`; 
                row.innerHTML = `
                    <div style="font-weight:900; width:40px; opacity:0.5; font-size: 1.2rem;">${p.num}</div>
                    <div class="pill-country">${p.n}</div>
                    <div style="font-weight:300; font-size: 1rem;">🎤 ${p.a}</div>
                `;
                grid.appendChild(row);
            });
        }

        function updateTimer() {
            const now = new Date().getTime();
            const targetDate = eventDates[currentView];
            const showEndTime = targetDate + (4 * 60 * 60 * 1000); 
            const diff = targetDate - now;
            const display = document.getElementById('timer-display');

            if (now >= showEndTime) {
                let message = (currentView === 'gf') ? "SEE YOU IN 2027" : "WATCH THE GRAND FINAL ON <br> MAY 16th 21:00 CEST";
                display.innerHTML = `<div class="post-event-msg">${message}</div>`;
                return;
            }
            if (now >= targetDate) {
                display.innerHTML = `<div style="font-size:3.5rem; font-weight:900;">LIVE NOW</div>`;
                document.body.classList.add('show-lights');
                return;
            }
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            display.innerHTML = `<div class="card"><span class="num-timer">${d}</span><span class="lab">Days</span></div><div class="card"><span class="num-timer">${h}</span><span class="lab">Hrs</span></div><div class="card"><span class="num-timer">${m}</span><span class="lab">Min</span></div><div class="card"><span class="num-timer">${s}</span><span class="lab">Sec</span></div>`;
        }

        setInterval(updateTimer, 1000);
        renderList();
        updateTimer();
    </script>
</body>
</html>
