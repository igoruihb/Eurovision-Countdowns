<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eurovision Song Contest 2026-Countdown</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --v-pink: #f12e67;
            --v-purple: #5c2084;
            --v-cyan: #00c3d7;
            --v-yellow: #ffb800;
            --row-grad: linear-gradient(90deg, #0a1142, #4d0a4f);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'Outfit', sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(-45deg, var(--v-cyan), var(--v-purple), var(--v-pink), var(--v-yellow));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden; padding-bottom: 50px;
        }

        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* THE CLICK OVERLAY */
        #audio-unlock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease;
        }

        .unlock-btn {
            background: white; color: black; border: none;
            padding: 18px 50px; border-radius: 50px;
            font-family: 'Outfit'; font-weight: 900; font-size: 1.3rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 40px rgba(255,255,255,0.4);
            transition: 0.3s;
        }
        .unlock-btn:hover { transform: scale(1.05); background: var(--v-cyan); color: white; }

        /* EFFECT LAYERS */
        #strobe-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
        }
        .flash-active { animation: flashAnim 0.12s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0.7; } 100% { opacity: 0; } }

        /* HEADER & LIGHTS */
        .logo-wrap { width: 90%; max-width: 450px; margin: 40px auto 20px; display: flex; justify-content: center; }
        .logo-wrap img { width: 100%; height: auto; filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); }

        .stage-light {
            position: fixed; top: -50%; width: 45vw; height: 200%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            pointer-events: none; opacity: 0; transition: opacity 2s; z-index: 1;
        }
        .light-1 { left: -5%; transform: rotate(25deg); }
        .light-2 { right: -5%; transform: rotate(-25deg); }
        
        .energy-high .stage-light { opacity: 1; }
        .energy-high .light-1 { animation: sweepLeft 4s infinite alternate ease-in-out; }
        .energy-high .light-2 { animation: sweepRight 4s infinite alternate ease-in-out; }
        
        @keyframes sweepLeft { 0% { transform: rotate(10deg); } 100% { transform: rotate(40deg); } }
        @keyframes sweepRight { 0% { transform: rotate(-10deg); } 100% { transform: rotate(-40deg); } }

        /* TIMER STYLES */
        #timer-display { 
            display: flex; gap: 12px; justify-content: center; 
            margin-bottom: 30px; min-height: 280px; align-items: center;
            perspective: 1000px; transition: transform 0.05s ease-out;
        }
        .beat-kick { transform: scale(1.15) translateZ(50px); filter: brightness(1.4); }

        .card { background: rgba(0,0,0,0.7); padding: 18px; border-radius: 20px; min-width: 100px; border: 1px solid rgba(255,255,255,0.1); transition: 0.1s; }
        .num { font-size: 2.8rem; font-weight: 900; display: block; }
        .lab { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
        
        .sixty-sec { font-size: 8rem; font-weight: 900; animation: pulseGlow 2s infinite; }
        .thirty-sec { font-size: 12rem; font-weight: 900; text-shadow: 0 0 30px var(--v-cyan); animation: pulse 1s infinite; }
        .super-giant-sec { font-size: 18rem; font-weight: 900; text-shadow: 0 0 60px var(--v-pink); animation: pulse 0.6s infinite; }
        .ultra-giant-sec { font-size: 38rem; font-weight: 900; color: var(--v-yellow); line-height: 0.7; animation: impact 0.3s infinite alternate; }

        .live-status { display: flex; align-items: center; gap: 20px; font-size: 4rem; font-weight: 900; }
        .dot { width: 30px; height: 30px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 30px #ff0000; animation: blink 0.8s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes impact { from { transform: scale(0.95); } to { transform: scale(1.05); } }

        /* NAVIGATION & LIST */
        nav { margin: 20px 0; display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 50px; z-index: 1000; }
        .tab { padding: 12px 25px; border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; color: rgba(255,255,255,0.4); }
        .tab.active { background: white; color: var(--v-purple); }
        
        .container { width: 95%; max-width: 900px; text-align: center; z-index: 10; }
        #countries-grid { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; align-items: center; opacity: 0; animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .run-number { font-size: 2rem; font-weight: 900; width: 70px; font-style: italic; opacity: 0.7; }
        .row-content { flex-grow: 1; display: flex; align-items: center; padding: 18px 35px; background: var(--row-grad); border-radius: 60px; border: 1px solid rgba(255,255,255,0.1); }
        .pill-country { background: white; color: #000; padding: 8px 22px; border-radius: 25px; font-weight: 900; margin-right: 15px; }

        @media (max-width: 768px) {
            .ultra-giant-sec { font-size: 16rem; }
            .live-status { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="strobe-fx"></div>

    <div id="audio-unlock">
        <img src="https://storage.googleapis.com/eurovision-com.appspot.com/renditions/public/cms/frame-2147206933png/Frame%202147206933-width%3D600.png" width="200" style="margin-bottom: 40px;">
        <button class="unlock-btn" onclick="startExperience()">Enter the Vienna Countdown</button>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5; letter-spacing: 1px;">ENABLES THE SONG AT THE END🤫🤫🤫</p>
    </div>

    <audio id="theme-song" src="https://www.image2url.com/r2/default/audio/1778596845793-0034c499-263a-42cb-8aca-a66fcb8ff833.mp3" preload="auto"></audio>

    <div class="stage-light light-1"></div>
    <div class="stage-light light-2"></div>

    <nav>
        <div class="tab active" onclick="changeView('sf1', this)">Semi 1</div>
        <div class="tab" onclick="changeView('sf2', this)">Semi 2</div>
        <div class="tab" onclick="changeView('gf', this)">Final</div>
    </nav>

    <div class="container">
        <div class="logo-wrap">
            <img src="https://storage.googleapis.com/eurovision-com.appspot.com/renditions/public/cms/frame-2147206933png/Frame%202147206933-width%3D600.png">
        </div>
        <div id="timer-display"></div>
        <h3 id="lineup-title" style="letter-spacing:4px; text-transform:uppercase; margin-bottom:30px;">First Semi-Final <span>Running Order</span></h3>
        <div id="countries-grid"></div>
    </div>

    <script>
        const themeAudio = document.getElementById('theme-song');
        const timerDisplay = document.getElementById('timer-display');
        const strobe = document.getElementById('strobe-fx');
        
        let audioUnlocked = false;
        let audioTriggered = false;
        let isEnergyHigh = false;

        function startExperience() {
            const overlay = document.getElementById('audio-unlock');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 600);

            themeAudio.play().then(() => {
                themeAudio.pause();
                themeAudio.currentTime = 0;
                audioUnlocked = true;
                requestAnimationFrame(syncVisuals);
            }).catch(e => {
                audioUnlocked = true;
                requestAnimationFrame(syncVisuals);
            });
        }

        function triggerFlash() {
            strobe.classList.remove('flash-active');
            void strobe.offsetWidth; // Reset animation
            strobe.classList.add('flash-active');
        }

        function triggerBump() {
            timerDisplay.classList.add('beat-kick');
            setTimeout(() => timerDisplay.classList.remove('beat-kick'), 80);
        }

        function syncVisuals() {
            const time = themeAudio.currentTime;

            // ANALYSIS OF NEW TRACK
            // Main Drop activates lights and background speed
            if (time >= 39.1 && !isEnergyHigh) {
                document.body.classList.add('energy-high');
                isEnergyHigh = true;
            }

            // Sync Pulsing to Kick Drum (~140 BPM) during energy peaks
            if (isEnergyHigh && (Math.floor(time * 1000) % 428 < 20)) {
                triggerBump();
                if(Math.random() > 0.8) triggerFlash();
            }

            if (!themeAudio.paused) requestAnimationFrame(syncVisuals);
        }

        const participants = {
            sf1: [
                {n:"Moldova", a:"Satoshi", s:"Viva, Moldova!", num:"01"},
                {n:"Sweden", a:"Felicia", s:"My System", num:"02"},
                {n:"Croatia", a:"Lelek", s:"Andromeda", num:"03"},
                {n:"Greece", a:"Akylas", s:"Ferto", num:"04"},
                {n:"Portugal", a:"Bandidos do Cante", s:"Rosa", num:"05"},
                {n:"Georgia", a:"Bzikebi", s:"On Replay", num:"06"},
                {n:"Italy", a:"Sal Da Vinci", s:"Per Sempre Sì", pq:true, sortIdx: 6.5},
                {n:"Finland", a:"Pete Parkkonen", s:"Liekinheitin", num:"07"},
                {n:"Montenegro", a:"Tamara Živković", s:"Nova Zora", num:"08"},
                {n:"Estonia", a:"Vanilla Ninja", s:"Too Epic", num:"09"},
                {n:"Israel", a:"Noam Bettan", s:"Michelle", num:"10"},
                {n:"Germany", a:"Sarah Engels", s:"Fire", pq:true, sortIdx: 10.5},
                {n:"Belgium", a:"Essyla", s:"Dancing on the Ice", num:"11"},
                {n:"Lithuania", a:"Lion Ceccah", s:"Sólo quiero más", num:"12"},
                {n:"San Marino", a:"Senhit", s:"Superstar", num:"13"},
                {n:"Poland", a:"ALICJA", s:"Pray", num:"14"},
                {n:"Serbia", a:"Lavina", s:"Kraj Mene", num:"15"}
            ],
            sf2: [
                {n:"Bulgaria", a:"Dara", s:"Bangaranga", num:"01"},
                {n:"Azerbaijan", a:"Jiva", s:"Just Go", num:"02"},
                {n:"Romania", a:"Alexandra Căpitănescu", s:"Choke Me", num:"03"},
                {n:"Luxembourg", a:"Eva Marija", s:"Mother Nature", num:"04"},
                {n:"Czechia", a:"Daniel Zizka", s:"Crossroads", num:"05"},
                {n:"France", a:"Monroe", s:"Regarde !", pq:true, sortIdx: 5.5},
                {n:"Armenia", a:"Simón", s:"Paloma Rumba", num:"06"},
                {n:"Switzerland", a:"Veronica Fusaro", s:"Alice", num:"07"},
                {n:"Cyprus", a:"Antigoni", s:"Jalla", num:"08"},
                {n:"Austria", a:"Cosmó", s:"Tanzschein", pq:true, sortIdx: 8.5},
                {n:"Latvia", a:"Atvara", s:"Ēnā", num:"09"},
                {n:"Denmark", a:"Søren Torpegaard Lund", s:"Før vi går hjem", num:"10"},
                {n:"Australia", a:"Delta Goodrem", s:"Eclipse", num:"11"},
                {n:"Ukraine", a:"Leléka", s:"Ridnym", num:"12"},
                {n:"United Kingdom", a:"LOOK MUM NO COMPUTER", s:"Eins, Zwei, Drei", pq:true, sortIdx: 12.5},
                {n:"Albania", a:"Alis", s:"Nân", num:"13"},
                {n:"Malta", a:"Aidan", s:"Bella", num:"14"},
                {n:"Norway", a:"Jonas Lovv", s:"Ya Ya Ya", num:"15"}
            ],
            gf: [
                {n:"Austria", a:"Cosmó", s:"Tanzschein", num:"01", pq:true},
                {n:"France", a:"Monroe", s:"Regarde !", num:"02", pq:true},
                {n:"Germany", a:"Sarah Engels", s:"Fire", num:"03", pq:true},
                {n:"Italy", a:"Sal Da Vinci", s:"Per Sempre Sì", num:"04", pq:true},
                {n:"United Kingdom", a:"LOOK MUM NO COMPUTER", s:"Eins, Zwei, Drei", num:"05", pq:true}
            ]
        };

        const eventDates = {
            sf1: new Date("May 12, 2026 21:00:00").getTime(),
            sf2: new Date("May 14, 2026 21:00:00").getTime(),
            gf: new Date("May 16, 2026 21:00:00").getTime()
        };

        let currentView = 'sf1';

        function changeView(view, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentView = view;
            const titles = {sf1: "First Semi-Final", sf2: "Second Semi-Final", gf: "Grand Final"};
            document.getElementById('lineup-title').innerHTML = titles[view] + " <span>Running Order</span>";
            audioTriggered = false; 
            renderList();
            updateTimer();
        }

        function renderList() {
            const grid = document.getElementById('countries-grid');
            grid.innerHTML = "";
            let list = [...participants[currentView]].sort((a,b) => (a.sortIdx || parseInt(a.num)) - (b.sortIdx || parseInt(b.num)));
            list.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.style.animationDelay = (i * 0.05) + "s";
                const num = (p.pq && currentView !== 'gf') ? '★' : p.num;
                row.innerHTML = `<div class="run-number">${num}</div><div class="row-content"><div class="pill-country">${p.n}</div><div style="font-size:0.9rem; opacity:0.8;">${p.a} — "${p.s}"</div></div>`;
                grid.appendChild(row);
            });
        }

        function updateTimer() {
            const now = new Date().getTime();
            const targetDate = eventDates[currentView];
            const diff = targetDate - now;

            if (diff <= 173000 && diff > 0 && !audioTriggered && audioUnlocked) {
                themeAudio.play();
                audioTriggered = true;
            }

            if (diff <= 0) {
                timerDisplay.innerHTML = `<div class="live-status"><div class="dot"></div> LIVE NOW</div>`;
                return;
            }

            const totalSecs = Math.ceil(diff / 1000);
            if (totalSecs <= 3) timerDisplay.innerHTML = `<div class="ultra-giant-sec">${totalSecs}</div>`;
            else if (totalSecs <= 10) timerDisplay.innerHTML = `<div class="super-giant-sec">${totalSecs}</div>`;
            else if (totalSecs <= 30) timerDisplay.innerHTML = `<div class="thirty-sec">${totalSecs}</div>`;
            else if (totalSecs <= 60) timerDisplay.innerHTML = `<div class="sixty-sec">${totalSecs}</div>`;
            else {
                const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                timerDisplay.innerHTML = (d > 0 ? `<div class="card"><span class="num">${d}</span><span class="lab">DAYS</span></div>` : "") +
                                    `<div class="card"><span class="num">${h}</span><span class="lab">HRS</span></div>` +
                                    `<div class="card"><span class="num">${m}</span><span class="lab">MIN</span></div>` +
                                    `<div class="card"><span class="num">${s}</span><span class="lab">SEC</span></div>`;
            }
        }

        setInterval(updateTimer, 1000);
        renderList();
        updateTimer();
    </script>
</body>
</html>
