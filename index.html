<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESC 2026 | Grand Final Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --v-pink: #f12e67;
            --v-purple: #5c2084;
            --v-cyan: #00c3d7;
            --v-yellow: #ffb800;
            --row-grad: linear-gradient(90deg, #0a1142, #4d0a4f);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'Outfit', sans-serif; color: white;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(-45deg, var(--v-cyan), var(--v-purple), var(--v-pink), var(--v-yellow));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden; padding-bottom: 50px;
        }

        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* --- INTRO ANIMATION --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #05081f; 
            z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .intro-hidden { opacity: 0; pointer-events: none; transform: scale(1.3); }
        .intro-text-main {
            font-size: 5rem; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(90deg, var(--v-cyan), var(--v-pink), var(--v-yellow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: introPulse 2s ease-in-out infinite;
            letter-spacing: 8px; text-align: center; margin: 0;
        }
        .intro-text-sub {
            font-size: 1.2rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 12px; margin-top: 10px; color: rgba(255,255,255,0.7);
            opacity: 0; transform: translateY(20px); animation: slideUpSub 1s ease-out forwards 0.3s;
        }

        @keyframes introPulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(241, 46, 103, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(0, 195, 215, 0.6)); transform: scale(1.03); }
        }
        @keyframes slideUpSub { to { opacity: 1; transform: translateY(0); } }

        /* --- MAIN WRAPPER --- */
        .main-wrapper {
            opacity: 0; transform: translateY(40px);
            transition: opacity 1s ease 0.6s, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s;
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        body.show-main .main-wrapper { opacity: 1; transform: translateY(0); }

        .logo-wrap { 
            width: 90%; max-width: 480px; margin: 40px auto 20px; 
            display: flex; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.5);
        }
        body.show-main .logo-wrap { transform: scale(1); }
        .logo-wrap img { width: 100%; height: auto; filter: drop-shadow(0 0 20px rgba(0,0,0,0.3)); }

        /* --- STAGE LIGHTS --- */
        .stage-light {
            position: fixed; top: -50%; width: 35vw; height: 200%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.25), transparent);
            pointer-events: none; opacity: 0; transition: opacity 2s ease-in-out; z-index: 1;
        }
        .light-1 { left: -5%; transform: rotate(25deg); }
        .light-2 { right: -5%; transform: rotate(-25deg); }
        .show-lights .stage-light { opacity: 1; }
        .show-lights .light-1 { animation: sweepLeft 8s infinite alternate ease-in-out; }
        .show-lights .light-2 { animation: sweepRight 8s infinite alternate ease-in-out; }

        @keyframes sweepLeft { 0% { transform: rotate(15deg); } 100% { transform: rotate(45deg); } }
        @keyframes sweepRight { 0% { transform: rotate(-15deg); } 100% { transform: rotate(-45deg); } }

        /* --- TIMER --- */
        #timer-display { 
            display: flex; gap: 10px; justify-content: center; 
            margin-bottom: 25px; min-height: 280px; align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); perspective: 1000px;
        }
        .phase-change { animation: phaseFlash 0.6s ease-out; }
        @keyframes phaseFlash {
            0% { transform: scale(0.8); filter: brightness(5); opacity: 0; }
            100% { transform: scale(1); filter: brightness(1); opacity: 1; }
        }

        .card { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; min-width: 90px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .num { font-size: 2.5rem; font-weight: 900; display: block; color: #ffffff; }
        .lab { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-top: 5px; }
        
        .sixty-sec { font-size: 7.5rem; font-weight: 900; color: #ffffff; animation: pulseGlow 2s infinite; }
        .thirty-sec { font-size: 11.5rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 30px var(--v-cyan); animation: pulse 1s infinite; }
        .super-giant-sec { font-size: 17rem; font-weight: 900; color: #ffffff; text-shadow: 0 0 60px var(--v-pink); animation: pulse 0.6s infinite; }
        .ultra-giant-sec { 
            font-size: 38rem; font-weight: 900; color: #ffffff;
            text-shadow: 0 0 100px white, 0 0 200px var(--v-pink); animation: impact 0.3s infinite alternate; line-height: 0.7;
        }

        /* --- LIVE STATUS --- */
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 9999; }
        .trigger-flash { animation: screenFlash 0.8s ease-out forwards; }
        @keyframes screenFlash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

        .live-status { display: flex; align-items: center; justify-content: center; gap: 20px; font-size: 4.5rem; font-weight: 900; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dot { width: 35px; height: 35px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 40px #ff0000; animation: blink 0.8s infinite; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1.2); } 50% { opacity: 0.1; transform: scale(0.8); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } }
        @keyframes impact { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        /* --- LIST UI --- */
        nav { margin: 20px 0; display: flex; gap: 8px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab { padding: 10px 22px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: 900; text-transform: uppercase; transition: 0.3s; color: rgba(255,255,255,0.4); }
        .tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .tab.active { background: white; color: var(--v-purple); transform: scale(1.05); }
        
        .container { width: 95%; max-width: 900px; text-align: center; z-index: 10; }
        #countries-grid { display: flex; flex-direction: column; gap: 12px; }
        
        .row { 
            display: flex; align-items: center; opacity: 0; 
            animation: swingIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
            transition: transform 0.3s ease;
        }
        .row:hover { transform: translateX(10px) scale(1.01); z-index: 11; }
        
        @keyframes swingIn {
            from { transform: rotateX(-30deg) translateY(30px); opacity: 0; }
            to { transform: rotateX(0deg) translateY(0); opacity: 1; }
        }

        .run-number { font-size: 2rem; font-weight: 900; width: 65px; font-style: italic; opacity: 1; text-align: center; color: #ffffff; }
        
        .row-content { 
            flex-grow: 1; display: flex; align-items: center; padding: 15px 30px; 
            background: var(--row-grad); border-radius: 60px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* Shimmer */
        .row-content::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(30deg); animation: shimmer 6s infinite;
        }
        @keyframes shimmer { 0% { left: -60%; } 20% { left: 120%; } 100% { left: 120%; } }

        .pill-country { background: white; color: #000; padding: 7px 20px; border-radius: 25px; font-weight: 900; margin-right: 15px; min-width: 130px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .pill-info { background: rgba(255,255,255,0.12); padding: 7px 16px; border-radius: 25px; font-size: 0.9rem; margin-right: 10px; border: 1px solid rgba(255,255,255,0.05); }
        
        @media (max-width: 768px) {
            .intro-text-main { font-size: 3rem; }
            .logo-wrap { max-width: 300px; }
            .ultra-giant-sec { font-size: 18rem; }
            .live-status { font-size: 2.2rem; }
            .row-content { flex-direction: column; padding: 15px; text-align: center; gap: 5px; border-radius: 20px; }
            .pill-country { margin-right: 0; margin-bottom: 5px; width: 100%; }
            .pill-info { margin-right: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <audio id="theme-song" src="http://googleusercontent.com/file_content/0"></audio>

    <div id="intro-overlay">
        <h1 class="intro-text-main">VIENNA 2026</h1>
        <div class="intro-text-sub">Grand Final Lineup</div>
    </div>

    <div id="flash-overlay"></div>
    <div class="stage-light light-1"></div>
    <div class="stage-light light-2"></div>

    <div class="main-wrapper">
        <nav>
            <div class="tab" onclick="changeView('sf1', this)">Semi 1</div>
            <div class="tab" onclick="changeView('sf2', this)">Semi 2</div>
            <div class="tab active" onclick="changeView('gf', this)">Grand Final</div>
        </nav>

        <div class="container">
            <div class="logo-wrap">
                <img src="https://storage.googleapis.com/eurovision-com.appspot.com/renditions/public/cms/frame-2147206933png/Frame%202147206933-width%3D600.png" alt="ESC 2026 Logo">
            </div>
            <div id="timer-display"></div>
            <h3 id="lineup-title" style="letter-spacing:3px; text-transform:uppercase; margin-bottom:25px; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">Grand Final <span>Running Order</span></h3>
            <div id="countries-grid"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').classList.add('intro-hidden');
                document.body.classList.add('show-main');
            }, 2500); 
        });

        const themeAudio = document.getElementById('theme-song');
        let audioTriggered = false;

        const participants = {
            sf1: [
                {n:"Moldova", a:"Satoshi", s:"Viva, Moldova!", num:"01"},
                {n:"Sweden", a:"Felicia", s:"My System", num:"02"},
                {n:"Croatia", a:"Lelek", s:"Andromeda", num:"03"},
                {n:"Greece", a:"Akylas", s:"Ferto", num:"04"},
                {n:"Portugal", a:"Bandidos do Cante", s:"Rosa", num:"05"},
                {n:"Georgia", a:"Bzikebi", s:"On Replay", num:"06"},
                {n:"Italy", a:"Sal Da Vinci", s:"Per Sempre Sì", pq:true, sortIdx: 6.5},
                {n:"Finland", a:"Pete Parkkonen", s:"Liekinheitin", num:"07"},
                {n:"Montenegro", a:"Tamara Živković", s:"Nova Zora", num:"08"},
                {n:"Estonia", a:"Vanilla Ninja", s:"Too Epic", num:"09"},
                {n:"Israel", a:"Noam Bettan", s:"Michelle", num:"10"},
                {n:"Germany", a:"Sarah Engels", s:"Fire", pq:true, sortIdx: 10.5},
                {n:"Belgium", a:"Essyla", s:"Dancing on the Ice", num:"11"},
                {n:"Lithuania", a:"Lion Ceccah", s:"Sólo quiero más", num:"12"},
                {n:"San Marino", a:"Senhit", s:"Superstar", num:"13"},
                {n:"Poland", a:"ALICJA", s:"Pray", num:"14"},
                {n:"Serbia", a:"Lavina", s:"Kraj Mene", num:"15"}
            ],
            sf2: [
                {n:"Bulgaria", a:"Dara", s:"Bangaranga", num:"01"},
                {n:"Azerbaijan", a:"Jiva", s:"Just Go", num:"02"},
                {n:"Romania", a:"Alexandra Căpitănescu", s:"Choke Me", num:"03"},
                {n:"Luxembourg", a:"Eva Marija", s:"Mother Nature", num:"04"},
                {n:"Czechia", a:"Daniel Zizka", s:"Crossroads", num:"05"},
                {n:"France", a:"Monroe", s:"Regarde !", pq:true, sortIdx: 5.5},
                {n:"Armenia", a:"Simón", s:"Paloma Rumba", num:"06"},
                {n:"Switzerland", a:"Veronica Fusaro", s:"Alice", num:"07"},
                {n:"Cyprus", a:"Antigoni", s:"Jalla", num:"08"},
                {n:"Austria", a:"Cosmó", s:"Tanzschein", pq:true, sortIdx: 8.5},
                {n:"Latvia", a:"Atvara", s:"Ēnā", num:"09"},
                {n:"Denmark", a:"Søren Torpegaard Lund", s:"Før vi går hjem", num:"10"},
                {n:"Australia", a:"Delta Goodrem", s:"Eclipse", num:"11"},
                {n:"Ukraine", a:"Leléka", s:"Ridnym", num:"12"},
                {n:"United Kingdom", a:"LOOK MUM NO COMPUTER", s:"Eins, Zwei, Drei", pq:true, sortIdx: 12.5},
                {n:"Albania", a:"Alis", s:"Nân", num:"13"},
                {n:"Malta", a:"Aidan", s:"Bella", num:"14"},
                {n:"Norway", a:"Jonas Lovv", s:"Ya Ya Ya", num:"15"}
            ],
            gf: [
                {n:"Denmark", a:"Søren Torpegaard Lund", s:"Før vi går hjem", num:"01"},
                {n:"Germany", a:"Sarah Engels", s:"Fire", num:"02"},
                {n:"Israel", a:"Noam Bettan", s:"Michelle", num:"03"},
                {n:"Belgium", a:"Essyla", s:"Dancing on the Ice", num:"04"},
                {n:"Albania", a:"Alis", s:"Nân", num:"05"},
                {n:"Greece", a:"Akylas", s:"Ferto", num:"06"},
                {n:"Ukraine", a:"Leléka", s:"Ridnym", num:"07"},
                {n:"Australia", a:"Delta Goodrem", s:"Eclipse", num:"08"},
                {n:"Serbia", a:"Lavina", s:"Kraj Mene", num:"09"},
                {n:"Malta", a:"Aidan", s:"Bella", num:"10"},
                {n:"Czechia", a:"Daniel Zizka", s:"Crossroads", num:"11"},
                {n:"Bulgaria", a:"Dara", s:"Bangaranga", num:"12"},
                {n:"Croatia", a:"Lelek", s:"Andromeda", num:"13"},
                {n:"United Kingdom", a:"LOOK MUM NO COMPUTER", s:"Eins, Zwei, Drei", num:"14"},
                {n:"France", a:"Monroe", s:"Regarde !", num:"15"},
                {n:"Moldova", a:"Satoshi", s:"Viva, Moldova!", num:"16"},
                {n:"Finland", a:"Pete Parkkonen", s:"Liekinheitin", num:"17"},
                {n:"Poland", a:"ALICJA", s:"Pray", num:"18"},
                {n:"Lithuania", a:"Lion Ceccah", s:"Sólo quiero más", num:"19"},
                {n:"Sweden", a:"Felicia", s:"My System", num:"20"},
                {n:"Cyprus", a:"Antigoni", s:"Jalla", num:"21"},
                {n:"Italy", a:"Sal Da Vinci", s:"Per Sempre Sì", num:"22"},
                {n:"Norway", a:"Jonas Lovv", s:"Ya Ya Ya", num:"23"},
                {n:"Romania", a:"Alexandra Căpitănescu", s:"Choke Me", num:"24"},
                {n:"Austria", a:"Cosmó", s:"Tanzschein", num:"25"}
            ]
        };

        const eventDates = {
            sf1: new Date("May 12, 2026 21:00:00").getTime(),
            sf2: new Date("May 14, 2026 21:00:00").getTime(),
            gf: new Date("May 16, 2026 21:00:00").getTime()
        };

        let currentView = 'gf';
        let lastPhase = "";

        function changeView(view, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentView = view;
            const titles = {sf1: "First Semi-Final", sf2: "Second Semi-Final", gf: "Grand Final"};
            document.getElementById('lineup-title').innerHTML = titles[view] + " <span>Running Order</span>";
            audioTriggered = false; 
            renderList();
            updateTimer();
        }

        function renderList() {
            const grid = document.getElementById('countries-grid');
            grid.innerHTML = "";
            let list = [...participants[currentView]].sort((a,b) => (a.sortIdx || parseInt(a.num)) - (b.sortIdx || parseInt(b.num)));
            list.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.style.animationDelay = (i * 0.05) + "s";
                const num = (p.pq && currentView !== 'gf') ? '★' : p.num;
                row.innerHTML = `<div class="run-number">${num}</div><div class="row-content"><div class="pill-country">${p.n}</div><div class="pill-info">🎤 ${p.a}</div><div class="pill-info">🎵 ${p.s}</div></div>`;
                grid.appendChild(row);
            });
        }

        function triggerPhaseAnimation() {
            const display = document.getElementById('timer-display');
            display.classList.remove('phase-change');
            void display.offsetWidth;
            display.classList.add('phase-change');
        }

        function updateTimer() {
            const now = new Date().getTime();
            const targetDate = eventDates[currentView];
            const diff = targetDate - now;
            const display = document.getElementById('timer-display');

            const triggerTimeMs = 173000;
            if (diff <= triggerTimeMs && diff > 0 && !audioTriggered) {
                themeAudio.play().catch(() => {});
                audioTriggered = true;
            }

            const showEndTime = targetDate + (4 * 60 * 60 * 1000); 
            if (now >= showEndTime) {
                display.innerHTML = currentView === 'gf' ? "<h2>SEE YOU IN 2027</h2>" : "<h3>WATCH THE GRAND FINAL ON<br>MAY 16th 21:00 CEST</h3>";
                document.body.classList.remove('show-lights');
                return;
            }

            if (diff <= 60000 && diff > 0) document.body.classList.add('show-lights');
            else if (diff > 60000) document.body.classList.remove('show-lights');

            if (diff <= 0) {
                if(lastPhase !== "live") {
                    document.getElementById('flash-overlay').classList.add('trigger-flash');
                    lastPhase = "live";
                }
                display.innerHTML = `<div class="live-status"><div class="dot"></div> LIVE NOW</div>`;
                return;
            }

            const totalSecs = Math.ceil(diff / 1000);
            let currentPhase = "";
            let content = "";

            if (totalSecs <= 3) {
                currentPhase = "ultra";
                content = `<div class="ultra-giant-sec">${totalSecs}</div>`;
            } else if (totalSecs <= 10) {
                currentPhase = "super";
                content = `<div class="super-giant-sec">${totalSecs}</div>`;
            } else if (totalSecs <= 30) {
                currentPhase = "thirty";
                content = `<div class="thirty-sec">${totalSecs}</div>`;
            } else if (totalSecs <= 60) {
                currentPhase = "sixty";
                content = `<div class="sixty-sec">${totalSecs}</div>`;
            } else {
                currentPhase = "normal";
                const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                content = (d > 0 ? `<div class="card"><span class="num">${d}</span><span class="lab">DAYS</span></div>` : "") +
                          (h > 0 || d > 0 ? `<div class="card"><span class="num">${h}</span><span class="lab">HRS</span></div>` : "") +
                          (m > 0 || h > 0 || d > 0 ? `<div class="card"><span class="num">${m}</span><span class="lab">MIN</span></div>` : "") +
                          `<div class="card"><span class="num">${s}</span><span class="lab">SEC</span></div>`;
            }

            if(lastPhase !== currentPhase) {
                triggerPhaseAnimation();
                lastPhase = currentPhase;
            }
            display.innerHTML = content;
        }

        setInterval(updateTimer, 1000);
        renderList();
        updateTimer();
    </script>
</body>
</html>
